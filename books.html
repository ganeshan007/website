<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Books — Ganeshan Malhotra</title>
  <meta name="author" content="Ganeshan Malhotra">
  <link rel="icon" type="image/jpg" href="images/avatar.jpg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Instrument+Sans:ital,wght@0,400..700;1,400..700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

    :root {
      --bg: #0C0C0E;
      --bg-elevated: #151518;
      --bg-card: #1A1A1F;
      --bg-card-hover: #1F1F26;
      --text-primary: #E8E6E1;
      --text-secondary: #9B978F;
      --text-tertiary: #6B6860;
      --accent: #D4A574;
      --accent-dim: #B8896040;
      --accent-glow: #D4A57420;
      --border: #2A2A30;
      --border-light: #3A3A42;
      --serif: 'Cormorant Garamond', Georgia, serif;
      --sans: 'Instrument Sans', -apple-system, sans-serif;
      --mono: 'JetBrains Mono', monospace;
      --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
    }

    [data-theme="light"] {
      --bg: #F6F4F0;
      --bg-elevated: #EDEAE4;
      --bg-card: #FFFFFF;
      --bg-card-hover: #FAF8F5;
      --text-primary: #1A1816;
      --text-secondary: #6B6560;
      --text-tertiary: #9B958E;
      --accent: #A0714A;
      --accent-dim: #A0714A25;
      --accent-glow: #A0714A15;
      --border: #DDD8D0;
      --border-light: #C8C2B8;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text-primary);
      line-height: 1.7;
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
      transition: background 0.5s ease, color 0.4s ease;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 9999;
      pointer-events: none;
      opacity: 0.025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 200px;
    }

    .ambient-glow {
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, var(--accent-dim) 0%, transparent 70%);
      top: -200px;
      right: -100px;
      pointer-events: none;
      z-index: 0;
      filter: blur(80px);
    }

    /* Nav */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      padding: 0 2rem;
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      background: color-mix(in srgb, var(--bg) 80%, transparent);
      border-bottom: 1px solid var(--border);
      transition: background 0.5s ease, border-color 0.4s ease;
    }
    .nav-inner {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
    }
    .nav-logo {
      font-family: var(--serif);
      font-size: 1.2rem;
      color: var(--text-primary);
      text-decoration: none;
      letter-spacing: -0.02em;
    }
    .nav-links {
      display: flex;
      align-items: center;
      gap: 2rem;
      list-style: none;
    }
    .nav-links a {
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      transition: color 0.3s ease;
      position: relative;
    }
    .nav-links a::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 0;
      width: 0;
      height: 1px;
      background: var(--accent);
      transition: width 0.4s var(--ease-out);
    }
    .nav-links a:hover { color: var(--accent); }
    .nav-links a:hover::after { width: 100%; }
    .nav-links a.active { color: var(--accent); }
    .nav-links a.active::after { width: 100%; }

    .theme-toggle {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-secondary);
      cursor: pointer;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      transition: all 0.3s ease;
    }
    .theme-toggle:hover {
      border-color: var(--accent);
      color: var(--accent);
      transform: rotate(30deg);
    }

    /* Main */
    main {
      position: relative;
      z-index: 1;
      max-width: 900px;
      margin: 0 auto;
      padding: 0 2rem;
      padding-top: 120px;
      padding-bottom: 5rem;
    }

    .section-label {
      font-family: var(--mono);
      font-size: 0.7rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: var(--accent);
      margin-bottom: 0.5rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .section-label::before {
      content: '';
      width: 24px;
      height: 1px;
      background: var(--accent);
    }
    .section-title {
      font-family: var(--serif);
      font-size: clamp(2rem, 4vw, 3rem);
      font-weight: 300;
      line-height: 1.15;
      letter-spacing: -0.03em;
      margin-bottom: 0.75rem;
    }
    .section-subtitle {
      color: var(--text-secondary);
      font-size: 1rem;
      margin-bottom: 3rem;
      max-width: 500px;
    }

    /* Book grid */
    .book-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 2rem;
    }
    .book-card {
      border: 1px solid var(--border);
      border-radius: 16px;
      background: var(--bg-card);
      overflow: hidden;
      transition: all 0.4s var(--ease-out);
    }
    .book-card:hover {
      border-color: var(--accent-dim);
      background: var(--bg-card-hover);
      transform: translateY(-6px);
      box-shadow: 0 16px 48px -12px rgba(0,0,0,0.3);
    }
    .book-cover {
      width: 100%;
      aspect-ratio: 2/3;
      object-fit: cover;
      display: block;
      filter: grayscale(10%);
      transition: filter 0.4s ease, transform 0.5s var(--ease-out);
    }
    .book-card:hover .book-cover {
      filter: grayscale(0%);
      transform: scale(1.03);
    }
    .book-cover-wrap {
      overflow: hidden;
      border-bottom: 1px solid var(--border);
    }
    .book-info {
      padding: 1rem 1.15rem;
    }
    .book-title {
      font-family: var(--serif);
      font-size: 1.15rem;
      font-weight: 400;
      line-height: 1.3;
      margin-bottom: 0.35rem;
    }
    .book-genre {
      font-family: var(--mono);
      font-size: 0.68rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--accent);
    }

    /* Back link */
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 500;
      margin-bottom: 3rem;
      transition: color 0.3s ease;
    }
    .back-link:hover { color: var(--accent); }
    .back-link svg { width: 16px; height: 16px; }

    /* Reveal */
    .reveal {
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 0.8s var(--ease-out), transform 0.8s var(--ease-out);
    }
    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }
    .reveal-delay-1 { transition-delay: 0.1s; }
    .reveal-delay-2 { transition-delay: 0.2s; }
    .reveal-delay-3 { transition-delay: 0.3s; }
    .reveal-delay-4 { transition-delay: 0.4s; }

    footer {
      padding: 3rem 0;
      text-align: center;
      font-size: 0.8rem;
      color: var(--text-tertiary);
      border-top: 1px solid var(--border);
    }

    @media (max-width: 600px) {
      .book-grid { grid-template-columns: repeat(2, 1fr); gap: 1rem; }
      main { padding: 100px 1.25rem 3rem; }
      nav { padding: 0 1.25rem; }
    }
  </style>
</head>
<body>
  <div class="ambient-glow"></div>

  <nav>
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">GM</a>
      <ul class="nav-links">
        <li><a href="index.html#about">About</a></li>
        <li><a href="index.html#experience">Experience</a></li>
        <li><a href="index.html#publications">Publications</a></li>
        <li><a href="books.html" class="active">Books</a></li>
      </ul>
      <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      </button>
    </div>
  </nav>

  <main>
    <a href="index.html" class="back-link reveal">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      Back to home
    </a>

    <div class="reveal">
      <span class="section-label">Reading</span>
      <h1 class="section-title">Books</h1>
      <p class="section-subtitle">Some books I've enjoyed reading.</p>
    </div>

    <div class="book-grid">
      <div class="book-card reveal reveal-delay-1">
        <div class="book-cover-wrap">
          <img src="images/heads_you_win.jpg" alt="Heads You Win" class="book-cover">
        </div>
        <div class="book-info">
          <div class="book-title">Heads You Win</div>
          <div class="book-genre">Fiction &middot; Thriller</div>
        </div>
      </div>
      <div class="book-card reveal reveal-delay-2">
        <div class="book-cover-wrap">
          <img src="images/outliers.jpg" alt="Outliers" class="book-cover">
        </div>
        <div class="book-info">
          <div class="book-title">Outliers</div>
          <div class="book-genre">Non-Fiction</div>
        </div>
      </div>
      <div class="book-card reveal reveal-delay-3">
        <div class="book-cover-wrap">
          <img src="images/freaknomics.jpg" alt="Freakonomics" class="book-cover">
        </div>
        <div class="book-info">
          <div class="book-title">Freakonomics</div>
          <div class="book-genre">Non-Fiction</div>
        </div>
      </div>
      <div class="book-card reveal reveal-delay-4">
        <div class="book-cover-wrap">
          <img src="images/don_quixote.jpg" alt="Don Quixote" class="book-cover">
        </div>
        <div class="book-info">
          <div class="book-title">Don Quixote</div>
          <div class="book-genre">Fiction &middot; Comedy</div>
        </div>
      </div>
      <div class="book-card reveal reveal-delay-1">
        <div class="book-cover-wrap">
          <img src="images/project_hail_mary.jpg" alt="Project Hail Mary" class="book-cover">
        </div>
        <div class="book-info">
          <div class="book-title">Project Hail Mary</div>
          <div class="book-genre">Fiction &middot; Sci-Fi</div>
        </div>
      </div>
    </div>
  </main>

  <footer>
    <p>&copy; 2026 Ganeshan Malhotra</p>
  </footer>

  <script>
    function toggleTheme() {
      const html = document.documentElement;
      const current = html.getAttribute('data-theme');
      if (current === 'light') html.removeAttribute('data-theme');
      else html.setAttribute('data-theme', 'light');
      localStorage.setItem('theme', current === 'light' ? 'dark' : 'light');
    }
    (function() {
      if (localStorage.getItem('theme') === 'light') document.documentElement.setAttribute('data-theme', 'light');
    })();

    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) entry.target.classList.add('visible');
      });
    }, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });
    document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
  </script>
</body>
</html>
